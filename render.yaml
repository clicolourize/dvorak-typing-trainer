services:
  - type: web
    name: dvorak-typing-trainer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.9"
      - key: FLASK_ENV
        value: production
    autoDeploy: true
    pullRequestPreviewsEnabled: true
